name: AirStringsDemo
options:
  bundleIdPrefix: com.airstrings
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  AirStrings:
    path: ../
targets:
  AirStringsDemo:
    type: application
    platform: iOS
    sources:
      - AirStringsDemo
    info:
      path: AirStringsDemo/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: AirStrings
